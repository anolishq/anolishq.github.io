name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          # --offline: skip HTTP/HTTPS, check only local filesystem links.
          # --base: resolve absolute paths (e.g. /repos/anolis/) against dist.
          args: >-
            --offline
            --no-progress
            --config .lychee.toml
            --base docs/.vitepress/dist
            "docs/.vitepress/dist/**/*.html"
          fail: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
